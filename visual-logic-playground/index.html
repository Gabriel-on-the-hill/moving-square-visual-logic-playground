<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Visual Logic Playground - An interactive teaching tool for learning coordinate systems and game logic">
    <title>Visual Logic Playground</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="app-container">
        <div id="game-area">
            <h1>Visual Logic Playground</h1>
            <div id="game-screen" role="region" aria-label="Game screen showing a draggable box">
                <div id="player-box" role="img" aria-label="Draggable player box" tabindex="0"></div>
            </div>
            <div id="coordinates-display" aria-live="polite" aria-label="Current box coordinates">
                <p><strong>Position:</strong></p>
                <p>x: <span id="coord-x">100</span></p>
                <p>y: <span id="coord-y">100</span></p>
                <p><strong>Bounds:</strong></p>
                <p>top: <span id="coord-top">100</span></p>
                <p>bottom: <span id="coord-bottom">150</span></p>
                <p>left: <span id="coord-left">100</span></p>
                <p>right: <span id="coord-right">150</span></p>
            </div>
        </div>
        <div id="controls-area">
            <h2>Human Keyboard Simulator</h2>
            <p class="instructions">Click buttons or use arrow keys to move the box</p>
            <div id="keyboard-controls" role="group" aria-label="Movement controls">
                <button id="btn-up" aria-label="Move up">↑ Up</button>
                <button id="btn-left" aria-label="Move left">← Left</button>
                <button id="btn-right" aria-label="Move right">→ Right</button>
                <button id="btn-down" aria-label="Move down">↓ Down</button>
            </div>
            <p><strong>Operation:</strong> <span id="operation-display" aria-live="polite">-</span></p>

            <h2>Boundary Visualizer</h2>
            <label>
                <input type="checkbox" id="toggle-boundaries" aria-label="Toggle boundary checking">
                Show Boundaries
            </label>
            <p id="boundary-message" aria-live="polite" aria-label="Boundary status message"></p>
        </div>
        <div id="code-preview-area">
            <h2>Live Python Code Preview</h2>
            <p class="instructions">This code updates as you interact with the game</p>
            <pre><code id="live-code"></code></pre>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
